document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"font-weight: 600; font-size: 15px; color: var(--ink,#2b2620);\">Reflect<\u002Fspan><span style=\"font-size: 12.5px; color: var(--ink2,#6c6353);\">Today's gentle prompt<\u002Fspan><\u002Fspan><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsection>\n\n            <!-- prompt of day -->\n            <section style=\"grid-column: {{ heroSpan }}; border-radius: 24px; padding: clamp(22px,3vw,30px); background: color-mix(in srgb, var(--accent-base,#6C8F5E) var(--wash,7%), var(--card,#fcfaf4)); border: 1px solid var(--line,#e7decd); display: flex; gap: 20px; align-items: center; flex-wrap: wrap;\">\n              <div style=\"flex: 1; min-width: 220px;\">\n                <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-fg,#6C8F5E);\">Prompt for today<\u002Fdiv>\n                <p style=\"margin: 12px 0 0; font-size: clamp(18px,2.2vw,22px); font-weight: 500; line-height: 1.4; color: var(--ink,#2b2620); text-wrap: pretty;\">{{ promptOfDay }}<\u002Fp>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ reflectOnToday }}\" style=\"background: var(--card,#fcfaf4); color: var(--accent-fg,#6C8F5E); border: 1px solid color-mix(in srgb, var(--accent-base,#6C8F5E) 40%, var(--line,#e7decd)); padding: 12px 20px; border-radius: 999px; font-weight: 600; font-size: 14.5px; white-space: nowrap;\">Write a reflection<\u002Fbutton>\n            <\u002Fsection>\n\n            <!-- recent -->\n            <section style=\"grid-column: {{ heroSpan }};\">\n              <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;\">\n                <h2 style=\"margin: 0; font-size: 17px; font-weight: 700; color: var(--ink,#2b2620);\">Recent practice<\u002Fh2>\n                <button sc-camel-on-click=\"{{ nav.journal }}\" style=\"border: 0; background: none; color: var(--accent-fg,#6C8F5E); font-weight: 600; font-size: 13.5px;\">Open journal →<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ hasRecent }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n                  <sc-for list=\"{{ recent }}\" as=\"e\" hint-placeholder-count=\"3\">\n                    <button sc-camel-on-click=\"{{ e.onClick }}\" style=\"{{ e.rowStyle }}\">\n                      <span style=\"{{ e.dotStyle }}\"><\u002Fspan>\n                      <span style=\"display: flex; flex-direction: column; align-items: flex-start; gap: 3px; min-width: 0; flex: 1;\">\n                        <span style=\"font-weight: 600; font-size: 14.5px; color: var(--ink,#2b2620);\">{{ e.title }}<\u002Fspan>\n                        <span style=\"font-size: 12.5px; color: var(--ink2,#6c6353); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;\">{{ e.subtitle }}<\u002Fspan>\n                      <\u002Fspan>\n                      <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted,#9c9078); white-space: nowrap;\">{{ e.when }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ noRecent }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"{{ emptyStyle }}\">Nothing logged yet. When you're ready, take a breath and begin.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsection>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ========= MEDITATE / LOG ========= -->\n      <sc-if value=\"{{ isLog }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ viewStyle }}\" key=\"log\">\n          <div style=\"{{ headRowStyle }}\">\n            <div style=\"flex: 1 1 auto; min-width: 0;\"><div style=\"{{ eyebrowStyle }}\">Meditation log<\u002Fdiv><h1 style=\"{{ h1Style }}\">Sit with what's here<\u002Fh1><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"{{ twoColStyle }}\">\n            <section style=\"position: relative; overflow: hidden; border-radius: 26px; border: 1px solid var(--line,#e7decd); background: linear-gradient(160deg, color-mix(in srgb, var(--accent-base,#6C8F5E) 15%, var(--card,#fcfaf4)), var(--card,#fcfaf4)); box-shadow: 0 8px 24px rgba(70,44,26,0.07); padding: clamp(24px,3vw,32px); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 18px;\">\n              <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-fg,#6C8F5E);\">Live session<\u002Fdiv>\n              <div style=\"position: relative; width: 176px; height: 176px; display: flex; align-items: center; justify-content: center;\">\n                <div aria-hidden=\"true\" style=\"position: absolute; inset: 0; border-radius: 999px; background: radial-gradient(circle, color-mix(in srgb, var(--accent-base,#6C8F5E) 30%, transparent), transparent 68%); animation: calmBreathe 8s ease-in-out infinite;\"><\u002Fdiv>\n                <div aria-hidden=\"true\" style=\"position: absolute; inset: 26px; border-radius: 999px; border: 1.5px solid color-mix(in srgb, var(--accent-base,#6C8F5E) 40%, transparent);\"><\u002Fdiv>\n                <span style=\"position: relative; font-family: 'JetBrains Mono', monospace; font-size: 34px; font-weight: 600; color: var(--ink,#2b2620); letter-spacing: 0.01em;\">{{ timerLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;\">\n                <button sc-camel-on-click=\"{{ timerToggle }}\" style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--accent-base,#6C8F5E); color: var(--onacc,#fff); border: 0; padding: 12px 24px; border-radius: 999px; font-weight: 600; font-size: 15px; box-shadow: 0 8px 20px color-mix(in srgb, var(--accent-base,#6C8F5E) 36%, transparent);\">{{ timerToggleLabel }}<\u002Fbutton>\n                <sc-if value=\"{{ timerActive }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ timerFinish }}\" style=\"background: var(--input,#efe9dc); color: var(--ink,#2b2620); border: 1px solid var(--line,#e7decd); padding: 12px 20px; border-radius: 999px; font-weight: 600; font-size: 15px;\">Finish &amp; log<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n              <p style=\"margin: 0; font-size: 13px; color: var(--ink2,#6c6353); max-width: 30ch;\">{{ timerHint }}<\u002Fp>\n            <\u002Fsection>\n\n            <section style=\"{{ cardStyle }}\">\n              <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted,#9c9078);\">Add a past sit<\u002Fdiv>\n              <p style=\"margin: 12px 0 20px; font-size: 15px; line-height: 1.55; color: var(--ink2,#6c6353);\">Meditated earlier? Record it with the type, how long, and how you felt before and after.<\u002Fp>\n              <button sc-camel-on-click=\"{{ openNewSession }}\" style=\"width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 9px; background: color-mix(in srgb, var(--accent-base,#6C8F5E) var(--fill,12%), var(--card,#fcfaf4)); color: var(--accent-fg,#6C8F5E); border: 1px solid color-mix(in srgb, var(--accent-base,#6C8F5E) 34%, var(--line,#e7decd)); padding: 14px; border-radius: 16px; font-weight: 600; font-size: 15px;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"6\" x2=\"12\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><\u002Fsvg>Log a session<\u002Fbutton>\n              <div style=\"margin-top: 22px; display: flex; flex-direction: column; gap: 11px;\">\n                <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted,#9c9078);\">Practice types<\u002Fdiv>\n                <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n                  <sc-for list=\"{{ typeList }}\" as=\"t\" hint-placeholder-count=\"6\">\n                    <span style=\"{{ t.chipStyle }}\"><span style=\"{{ t.dotStyle }}\"><\u002Fspan>{{ t.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsection>\n          <\u002Fdiv>\n\n          <div style=\"margin-top: 26px;\">\n            <h2 style=\"margin: 0 0 14px; font-size: 17px; font-weight: 700; color: var(--ink,#2b2620);\">Recent sessions<\u002Fh2>\n            <sc-if value=\"{{ hasSessions }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"{{ sessionGridStyle }}\">\n                <sc-for list=\"{{ sessionCards }}\" as=\"s\" hint-placeholder-count=\"6\">\n                  <button sc-camel-on-click=\"{{ s.onClick }}\" style=\"{{ cardStyleSm }}\">\n                    <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 10px;\">\n                      <span style=\"display: inline-flex; align-items: center; gap: 8px;\"><span style=\"{{ s.dotStyle }}\"><\u002Fspan><span style=\"font-weight: 600; font-size: 15px; color: var(--ink,#2b2620);\">{{ s.type }}<\u002Fspan><\u002Fspan>\n                      <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent-fg,#6C8F5E); font-weight: 600;\">{{ s.minutes }}m<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted,#9c9078); margin-top: 10px;\">{{ s.when }}<\u002Fdiv>\n                    <div style=\"display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12.5px; color: var(--ink2,#6c6353);\"><span style=\"{{ s.moodChipBefore }}\">{{ s.moodBeforeLabel }}<\u002Fspan><svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted,#9c9078)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><polyline points=\"13 7 18 12 13 17\"><\u002Fpolyline><\u002Fsvg><span style=\"{{ s.moodChipAfter }}\">{{ s.moodAfterLabel }}<\u002Fspan><\u002Fdiv>\n                    <sc-if value=\"{{ s.hasNotes }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin: 12px 0 0; font-size: 13px; line-height: 1.5; color: var(--ink2,#6c6353); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;\">{{ s.notes }}<\u002Fp><\u002Fsc-if>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noSessions }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ emptyStyle }}\">No sessions yet. Start a live sit above, or log one you've already done.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ========= BREATHE ========= -->\n      <sc-if value=\"{{ isBreathe }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ viewStyle }}\" key=\"breathe\">\n          <div style=\"{{ headRowStyle }}\"><div style=\"flex: 1 1 auto; min-width: 0;\"><div style=\"{{ eyebrowStyle }}\">Breathing<\u002Fdiv><h1 style=\"{{ h1Style }}\">Find your rhythm<\u002Fh1><p style=\"margin: 8px 0 0; font-size: 15px; color: var(--ink2,#6c6353); max-width: 46ch;\">Pick a pattern and follow the circle — expand as you breathe in, settle as you breathe out.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <div style=\"{{ breatheGridStyle }}\">\n            <sc-for list=\"{{ patternCards }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ p.onStart }}\" style=\"{{ cardStyle }}; text-align: left; cursor: pointer;\">\n                <div style=\"display: flex; align-items: center; gap: 16px;\">\n                  <span style=\"position: relative; width: 66px; height: 66px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;\">\n                    <span aria-hidden=\"true\" style=\"position: absolute; inset: 0; border-radius: 999px; background: radial-gradient(circle, color-mix(in srgb, var(--accent-base,#6C8F5E) 32%, transparent), transparent 70%); animation: calmBreathe {{ p.dur }} ease-in-out infinite;\"><\u002Fspan>\n                    <span aria-hidden=\"true\" style=\"position: absolute; inset: 14px; border-radius: 999px; border: 1.5px solid color-mix(in srgb, var(--accent-base,#6C8F5E) 46%, transparent);\"><\u002Fspan>\n                  <\u002Fspan>\n                  <span style=\"min-width: 0;\"><span style=\"display: block; font-weight: 700; font-size: 18px; color: var(--ink,#2b2620);\">{{ p.name }}<\u002Fspan><span style=\"display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--accent-fg,#6C8F5E); margin-top: 4px;\">{{ p.cadence }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"margin: 16px 0 0; font-size: 14px; line-height: 1.55; color: var(--ink2,#6c6353);\">{{ p.desc }}<\u002Fp>\n                <div style=\"margin-top: 16px; display: inline-flex; align-items: center; gap: 7px; color: var(--accent-fg,#6C8F5E); font-weight: 600; font-size: 14px;\">Begin<svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><polyline points=\"13 7 18 12 13 17\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ========= MOOD ========= -->\n      <sc-if value=\"{{ isMood }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ viewStyle }}\" key=\"mood\">\n          <div style=\"{{ headRowStyle }}\"><div style=\"flex: 1 1 auto; min-width: 0;\"><div style=\"{{ eyebrowStyle }}\">Mood &amp; reflection<\u002Fdiv><h1 style=\"{{ h1Style }}\">How are you, really?<\u002Fh1><\u002Fdiv><\u002Fdiv>\n          <div style=\"{{ twoColStyle }}\">\n            <section style=\"{{ cardStyle }}\">\n              <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted,#9c9078);\">Check in<\u002Fdiv>\n              <p style=\"margin: 10px 0 18px; font-size: 15px; color: var(--ink2,#6c6353);\">There's no wrong answer. Just notice.<\u002Fp>\n              <div style=\"display: flex; flex-wrap: wrap; gap: 10px;\">\n                <sc-for list=\"{{ moodPicker }}\" as=\"m\" hint-placeholder-count=\"7\">\n                  <button sc-camel-on-click=\"{{ m.onPick }}\" style=\"{{ m.btnStyle }}\"><span style=\"{{ m.dotStyle }}\"><\u002Fspan>{{ m.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <textarea value=\"{{ moodNote }}\" sc-camel-on-input=\"{{ onMoodNote }}\" placeholder=\"Anything you'd like to note about how you feel?\" rows=\"3\" style=\"margin-top: 18px; width: 100%; border: 1px solid var(--line,#e7decd); background: var(--input,#efe9dc); border-radius: 14px; padding: 13px 15px; font-size: 14.5px; color: var(--ink,#2b2620); line-height: 1.5;\"><\u002Ftextarea>\n              <button sc-camel-on-click=\"{{ saveMood }}\" style=\"{{ primaryBtnStyle }}; margin-top: 14px; width: 100%;\">Save check-in<\u002Fbutton>\n            <\u002Fsection>\n            <section style=\"{{ cardStyle }}\">\n              <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted,#9c9078);\">Recent check-ins<\u002Fdiv>\n              <sc-if value=\"{{ hasMoods }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display: flex; flex-direction: column; gap: 12px; margin-top: 16px;\">\n                  <sc-for list=\"{{ moodList }}\" as=\"m\" hint-placeholder-count=\"5\">\n                    <div style=\"display: flex; align-items: center; gap: 12px;\">\n                      <span style=\"{{ m.dotStyle }}\"><\u002Fspan>\n                      <span style=\"flex: 1; min-width: 0;\"><span style=\"font-weight: 600; font-size: 14.5px; color: var(--ink,#2b2620);\">{{ m.label }}<\u002Fspan><sc-if value=\"{{ m.hasNote }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display: block; font-size: 13px; color: var(--ink2,#6c6353); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ m.note }}<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                      <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted,#9c9078); white-space: nowrap;\">{{ m.when }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ noMoods }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ emptyStyle }}\">No check-ins yet.<\u002Fdiv><\u002Fsc-if>\n            <\u002Fsection>\n          <\u002Fdiv>\n          <div style=\"margin-top: 26px;\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;\"><h2 style=\"margin: 0; font-size: 17px; font-weight: 700; color: var(--ink,#2b2620);\">Reflections<\u002Fh2><button sc-camel-on-click=\"{{ openNewReflection }}\" style=\"{{ ghostBtnStyle }}\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"6\" x2=\"12\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><\u002Fsvg>New reflection<\u002Fbutton><\u002Fdiv>\n            <sc-if value=\"{{ hasReflections }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"{{ reflectGridStyle }}\">\n                <sc-for list=\"{{ reflectionCards }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <button sc-camel-on-click=\"{{ r.onClick }}\" style=\"{{ cardStyleSm }}; text-align: left;\">\n                    <div style=\"display: flex; gap: 6px; flex-wrap: wrap;\"><sc-for list=\"{{ r.tags }}\" as=\"tg\" hint-placeholder-count=\"1\"><span style=\"{{ tg.style }}\">{{ tg.label }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                    <p style=\"margin: 12px 0 0; font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--accent-fg,#6C8F5E);\">{{ r.prompt }}<\u002Fp>\n                    <p style=\"margin: 9px 0 0; font-size: 13.5px; line-height: 1.55; color: var(--ink2,#6c6353); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;\">{{ r.text }}<\u002Fp>\n                    <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted,#9c9078); margin-top: 13px;\">{{ r.when }}<\u002Fdiv>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noReflections }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ emptyStyle }}\">No reflections yet. A prompt can help you begin.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ========= PROMPTS ========= -->\n      <sc-if value=\"{{ isPrompts }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ viewStyle }}\" key=\"prompts\">\n          <div style=\"{{ headRowStyle }}\"><div style=\"flex: 1 1 auto; min-width: 0;\"><div style=\"{{ eyebrowStyle }}\">Guided prompts<\u002Fdiv><h1 style=\"{{ h1Style }}\">A question to sit with<\u002Fh1><\u002Fdiv><button sc-camel-on-click=\"{{ shufflePrompt }}\" style=\"{{ ghostBtnStyle }}\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 4 21 4 21 9\"><\u002Fpolyline><path d=\"M21 4l-7 7\"><\u002Fpath><polyline points=\"8 20 3 20 3 15\"><\u002Fpolyline><path d=\"M3 20l7-7\"><\u002Fpath><\u002Fsvg>Shuffle<\u002Fbutton><\u002Fdiv>\n          <section style=\"position: relative; overflow: hidden; border-radius: 26px; border: 1px solid var(--line,#e7decd); background: linear-gradient(150deg, color-mix(in srgb, var(--accent-base,#6C8F5E) 16%, var(--card,#fcfaf4)), color-mix(in srgb, var(--accent-base,#6C8F5E) 5%, var(--card,#fcfaf4))); box-shadow: 0 8px 24px rgba(70,44,26,0.07); padding: clamp(28px,4vw,44px); text-align: center;\">\n            <svg aria-hidden=\"true\" sc-camel-view-box=\"0 0 140 90\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"position: absolute; left: 50%; bottom: -8px; transform: translateX(-50%); width: 300px; height: auto; color: color-mix(in srgb, var(--accent-base,#6C8F5E) 36%, transparent); z-index: 0;\"><path d=\"M70 84 C70 54 70 30 70 16\"><\u002Fpath><path d=\"M70 84 C58 58 50 40 45 24 C57 34 66 50 70 66\"><\u002Fpath><path d=\"M70 84 C82 58 90 40 95 24 C83 34 74 50 70 66\"><\u002Fpath><path d=\"M70 84 C48 68 28 58 12 52 C28 44 52 48 70 64\"><\u002Fpath><path d=\"M70 84 C92 68 112 58 128 52 C112 44 88 48 70 64\"><\u002Fpath><\u002Fsvg>\n            <div style=\"position: relative; z-index: 1;\">\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-fg,#6C8F5E);\">Featured prompt<\u002Fdiv>\n            <p style=\"margin: 18px auto 0; font-size: clamp(24px,3.6vw,34px); font-weigh utton sc-camel-on-click=\"{{ pickerNext }}\" style=\"{{ pickerNavStyle }}\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 5 16 12 9 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ pickerDayStage }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 3px; margin-bottom: 6px;\"><sc-for list=\"{{ dowLabels }}\" as=\"d\" hint-placeholder-count=\"7\"><span style=\"text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted,#9c9078); padding: 4px 0;\">{{ d.label }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 3px;\"><sc-for list=\"{{ pickerDays }}\" as=\"c\" hint-placeholder-count=\"35\"><button sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ pickerMonthStage }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px;\"><sc-for list=\"{{ pickerMonths }}\" as=\"m\" hint-placeholder-count=\"12\"><button sc-camel-on-click=\"{{ m.onClick }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ pickerYearStage }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px;\"><sc-for list=\"{{ pickerYears }}\" as=\"y\" hint-placeholder-count=\"12\"><button sc-camel-on-click=\"{{ y.onClick }}\" style=\"{{ y.style }}\">{{ y.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px;\"><button sc-camel-on-click=\"{{ pickerToday }}\" style=\"{{ ghostBtnStyle }}\">Today<\u002Fbutton><button sc-camel-on-click=\"{{ closePicker }}\" style=\"{{ softBtnStyle }}\">Done<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Confirm -->\n  <sc-if value=\"{{ confirmOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"{{ modalScrimStyle }}\" sc-camel-on-click=\"{{ closeConfirmBackdrop }}\">\n      <div style=\"background: var(--card,#fcfaf4); border: 1px solid var(--line,#e7decd); border-radius: 22px; padding: 26px; width: 380px; max-width: 92vw; box-shadow: 0 30px 70px rgba(20,16,10,0.4);\" sc-camel-on-click=\"{{ stop }}\">\n        <h3 style=\"margin: 0 0 8px; font-size: 19px; font-weight: 700; color: var(--ink,#2b2620);\">{{ confirmTitle }}<\u002Fh3>\n        <p style=\"margin: 0 0 22px; font-size: 14.5px; line-height: 1.55; color: var(--ink2,#6c6353);\">{{ confirmMsg }}<\u002Fp>\n        <div style=\"display: flex; gap: 12px; justify-content: flex-end;\"><button sc-camel-on-click=\"{{ closeConfirm }}\" style=\"{{ softBtnStyle }}\">Cancel<\u002Fbutton><button sc-camel-on-click=\"{{ confirmYes }}\" style=\"{{ dangerSolidBtnStyle }}\">{{ confirmYesLabel }}<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Toast -->\n  <sc-if value=\"{{ toastOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%); z-index: 100; background: var(--ink,#2b2620); color: var(--bg,#F4F0E7); padding: 13px 22px; border-radius: 999px; font-size: 14px; font-weight: 500; box-shadow: 0 12px 30px rgba(20,16,10,0.3); animation: fadeUp .3s ease;\">{{ toastText }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.KEY = 'wp_stillpoint_v1';\n    this.VIEWKEY = 'wp_stillpoint_view';\n    this.VIEWS = ['today','log','breathe','mood','prompts','journal','progress','settings'];\n    this.ACCENTS = {\n      sage:     { label: 'Sage',     base: '#6C8F5E', strong: '#57774A' },\n      rose:     { label: 'Rose',     base: '#BC7383', strong: '#A15A6B' },\n      blush:    { label: 'Blush',    base: '#CB7A64', strong: '#B0604B' },\n      lavender: { label: 'Lavender', base: '#8B78B4', strong: '#6E5C99' },\n      sky:      { label: 'Sky',      base: '#5E88B2', strong: '#456F98' },\n    };\n    this.LIGHT = { bg:'#F4F0E7', card:'#FCFAF4', raised:'#FFFFFF', input:'#EFE9DC', line:'#E7DECD', track:'#EAE2D3', muted:'#9C9078', ink2:'#6C6353', ink:'#2B2620' };\n    this.DARK  = { bg:'#191712', card:'#241F19', raised:'#2B261F', input:'#302A22', line:'#3A332A', track:'#332D25', muted:'#9A8F79', ink2:'#B7AD9A', ink:'#F2ECE0' };\n    this.STATUS_LIGHT = { pos:'#5E9568', posBg:'#E8F0E6', warn:'#C39A4A', warnBg:'#F3ECD8', neg:'#B9705E', negBg:'#F3E4DF' };\n    this.STATUS_DARK  = { pos:'#7FB183', posBg:'#232C21', warn:'#D6B15E', warnBg:'#2E2A1B', neg:'#CE8676', negBg:'#2E241F' };\n    this.TYPES = [\n      { key:'breathing', label:'Breathing', color:'#6E97BE' },\n      { key:'body-scan', label:'Body scan', color:'#9787BE' },\n      { key:'guided', label:'Guided', color:'#C58BA0' },\n      { key:'walking', label:'Walking', color:'#7FA06F' },\n      { key:'loving-kindness', label:'Loving-kindness', color:'#D08C7A' },\n      { key:'silent', label:'Silent sit', color:'#8AA0A8' },\n      { key:'visualization', label:'Visualization', color:'#C6A24E' },\n    ];\n    this.MOODS = [\n      { key:'joyful', label:'Joyful', v:5, color:'#D0A24E' },\n      { key:'content', label:'Content', v:4, color:'#7FA06F' },\n      { key:'calm', label:'Calm', v:4, color:'#6E97BE' },\n      { key:'okay', label:'Okay', v:3, color:'#9AA0A6' },\n      { key:'tired', label:'Tired', v:2, color:'#9787BE' },\n      { key:'anxious', label:'Anxious', v:2, color:'#D08C7A' },\n      { key:'low', label:'Low', v:1, color:'#B5798A' },\n    ];\n    this.PATTERNS = [\n      { key:'box', name:'Box Breathing', cadence:'4 · 4 · 4 · 4', desc:'Equal parts in, hold, out, hold. Steadies a scattered mind.', phases:[['Breathe in',4,1],['Hold',4,1],['Breathe out',4,0.58],['Hold',4,0.58]] },\n      { key:'478', name:'4 · 7 · 8 Breath', cadence:'4 · 7 · 8', desc:'A long, slow exhale to soften the nervous system before rest.', phases:[['Breathe in',4,1],['Hold',7,1],['Breathe out',8,0.58]] },\n      { key:'calm', name:'Calming Breath', cadence:'4 in · 6 out', desc:'A longer out-breath than in. Simple, and quietly grounding.', phases:[['Breathe in',4,1],['Breathe out',6,0.58]] },\n      { key:'coherent', name:'Coherent Breath', cadence:'5.5 · 5.5', desc:'Five and a half seconds each way — the pace of settled calm.', phases:[['Breathe in',5.5,1],['Breathe out',5.5,0.58]] },\n    ];\n    this.PROMPTS = [\n      'What does your body feel like right now?',\n      'Name one thing you can let go of today.',\n      'Where did you feel most at ease today?',\n      'What is asking for your attention right now?',\n      'Notice three sounds around you. Just listen.',\n      'What are you grateful for in this moment?',\n      'What would rest look like for you today?',\n      'Where are you holding tension? Can you soften it?',\n      'What thought keeps returning? Can you watch it pass?',\n      'How does your breath feel — shallow or deep?',\n      'What do you need less of right now?',\n      'What small kindness can you offer yourself today?',\n      'When did you last feel truly still?',\n      'What is here, right now, that is already enough?',\n      'Name the emotion you feel — without judging it.',\n      'What can safely wait until tomorrow?',\n    ];\n    this.INTENTIONS = ['Be where my feet are.','Move slowly today.','One breath at a time.','Soften, d
